<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCHEMARCHITECT v40</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  font-family: system-ui, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
  margin: 0;
  padding: 20px;
}
.glass {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 20px;
}
button {
  border: none;
  border-radius: 14px;
  padding: 14px 24px;
  font-weight: 600;
  cursor: pointer;
}
.primary {
  background: linear-gradient(135deg,#3b82f6,#1d4ed8);
}
.success {
  background: linear-gradient(135deg,#10b981,#059669);
}
pre {
  background: #0f172a;
  padding: 20px;
  border-radius: 12px;
  overflow: auto;
  max-height: 400px;
}
.tab-active {
  background: #3b82f6;
}
.hidden { display:none; }
</style>
</head>

<body>

<div class="max-w-4xl mx-auto space-y-10">

<h1 class="text-4xl font-bold text-center">SCHEMARCHITECT v40</h1>

<!-- INPUT -->
<div class="glass p-6">
  <div class="flex gap-4">
    <input id="urlInput" type="url" placeholder="https://example.com"
      class="flex-1 p-4 bg-white/10 rounded-xl">
    <button id="startBtn" class="primary">ANALIZUJ</button>
  </div>
</div>

<!-- LOADER -->
<div id="loader" class="glass p-6 text-center hidden">
  Analizuję...
</div>

<!-- RESULTS -->
<div id="results" class="hidden space-y-6">

  <div class="glass p-6 flex justify-between items-center">
    <div>
      <div id="type">Product</div>
      <div id="summary">1 schema</div>
    </div>
    <div class="flex gap-2">
      <button id="generateBtn" class="success">GENERUJ</button>
      <button id="copyBtn">KOPIUJ</button>
    </div>
  </div>

  <!-- TABS -->
  <div class="flex gap-2">
    <button class="tab tab-active" data-tab="existing">Istniejące</button>
    <button class="tab" data-tab="generated">Wygenerowane</button>
  </div>

  <!-- EXISTING -->
  <div id="existingTab">
    <pre id="existingJson">{}</pre>
  </div>

  <!-- GENERATED -->
  <div id="generatedTab" class="hidden">
    <pre id="generatedJson">Kliknij GENERUJ</pre>
  </div>

</div>

</div>

<script>
let data = null;
let generated = null;

async function analyze(url){
  await new Promise(r=>setTimeout(r,800));
  return {
    type:'Product',
    schemas:[{ "@type":"Product", name:"Demo"}]
  }
}

document.getElementById('startBtn').onclick = async ()=>{
  const url = document.getElementById('urlInput').value;
  if(!url) return alert('URL required');

  document.getElementById('loader').classList.remove('hidden');

  const res = await analyze(url);
  data = res;

  document.getElementById('loader').classList.add('hidden');
  document.getElementById('results').classList.remove('hidden');

  document.getElementById('type').textContent = res.type;
  document.getElementById('summary').textContent = res.schemas.length + ' schema';
  document.getElementById('existingJson').textContent = JSON.stringify(res.schemas,null,2);
};

document.getElementById('generateBtn').onclick = ()=>{
  if(!data) return;

  generated = {
    "@context":"https://schema.org",
    "@type":data.type,
    name:"Generated Schema"
  };

  document.getElementById('generatedJson').textContent = JSON.stringify(generated,null,2);
};

document.getElementById('copyBtn').onclick = ()=>{
  if(!generated) return alert('Najpierw generuj');

  navigator.clipboard.writeText(JSON.stringify(generated,null,2));
};

document.querySelectorAll('.tab').forEach(btn=>{
  btn.onclick = ()=>{
    document.querySelectorAll('.tab').forEach(b=>b.classList.remove('tab-active'));
    btn.classList.add('tab-active');

    document.getElementById('existingTab').classList.add('hidden');
    document.getElementById('generatedTab').classList.add('hidden');

    document.getElementById(btn.dataset.tab+'Tab').classList.remove('hidden');
  }
});
</script>

</body>
</html>
